<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Factura</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
            padding: 20px;
        }

        .factura {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 10px;
        }

        .dato {
            margin: 5px 0;
            font-size: 16px;
        }

        table {
            width: 100%;
            margin: 20px 0;
            border-collapse: collapse;
        }

        table th, table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        table th {
            background-color: #4CAF50;
            color: white;
        }

        .boton {
            display: block;
            margin: 10px 0;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .whatsapp {
            background: #25D366;
            color: white;
        }

        .debug {
            background: #f0f0f0;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            font-size: 12px;
            text-align: left;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="factura">
    <h2>🧾 Factura</h2>

    <div class="dato" id="numero"></div>
    <div class="dato" id="cliente"></div>
    <div class="dato" id="fecha"></div>
    
    <table id="tablaProductos">
        <thead>
            <tr>
                <th>Producto</th>
                <th>Cant</th>
                <th>Sub Total</th>
            </tr>
        </thead>
        <tbody id="lista">
        </tbody>
    </table>
    
    <div class="dato" id="total"></div>

    <!-- DEBUG INFO -->
    <div class="debug">
        <strong>🔍 DEBUG:</strong>
        <div id="debug-productos"></div>
        <div id="debug-count"></div>
    </div>

    <button class="boton whatsapp" onclick="enviarWhatsApp()">📲 Enviar por WhatsApp</button>
</div>

<script>
console.log("=== INICIO DEBUG ===");

const params = new URLSearchParams(window.location.search);

const numero = params.get("num") || "00000";
const cliente = params.get("cliente") || "Consumidor Final";
const fecha = params.get("fecha") || "Sin fecha";
const total = params.get("total") || "0";
const productosRaw = params.get("productos") || "";

// DEBUG: Mostrar todos los parámetros
console.log("Número:", numero);
console.log("Cliente:", cliente);
console.log("Fecha:", fecha);
console.log("Total:", total);
console.log("Productos RAW:", productosRaw);
console.log("Longitud productos:", productosRaw.length);

// Mostrar en pantalla para debug
document.getElementById("debug-productos").innerHTML = `Productos RAW: ${productosRaw}`;

// Inicializar variables
let tablaHtml = "";
let mensajeProductosWhatsApp = "";
let contadorProductos = 0;

if (productosRaw && productosRaw.length > 0) {
    console.log("Procesando productos...");
    const filas = productosRaw.split("|");
    console.log("Número de filas:", filas.length);
    console.log("Filas:", filas);
    
    filas.forEach((fila, index) => {
        console.log(`Procesando fila ${index}:`, fila);
        const datos = fila.split(",");
        console.log(`Datos de fila ${index}:`, datos);
        
        if (datos.length >= 3) {
            const producto = datos[0].trim();
            const cantidad = datos[1].trim();
            const subtotal = datos[2].trim();
            
            console.log(`Producto: ${producto}, Cantidad: ${cantidad}, Subtotal: ${subtotal}`);
            
            // Construir la tabla HTML
            tablaHtml += `<tr><td>${producto}</td><td>${cantidad}</td><td>$${subtotal}</td></tr>`;
            
            // Construir el mensaje de WhatsApp
            mensajeProductosWhatsApp += `*Producto:* ${producto}\n*Cantidad:* ${cantidad}\n*Subtotal:* $${subtotal}\n\n`;
            
            contadorProductos++;
        } else {
            console.log(`Fila ${index} tiene datos insuficientes:`, datos.length);
        }
    });
} else {
    console.log("No hay productos para procesar");
}

console.log("Total productos procesados:", contadorProductos);
console.log("Mensaje WhatsApp:", mensajeProductosWhatsApp);
console.log("=== FIN DEBUG ===");

// Mostrar contador en debug
document.getElementById("debug-count").innerHTML = `Productos encontrados: ${contadorProductos}`;

// Actualizar el DOM
document.getElementById("numero").innerHTML = `<b>Factura N°:</b> ${numero}`;
document.getElementById("cliente").innerHTML = `<b>Cliente:</b> ${cliente}`;
document.getElementById("fecha").innerHTML = `<b>Fecha:</b> ${fecha}`;
document.getElementById("total").innerHTML = `<b>Total: $${total}</b>`;
document.getElementById("lista").innerHTML = tablaHtml || "<tr><td colspan='3'>No hay productos</td></tr>";

function enviarWhatsApp() {
    console.log("Enviando WhatsApp...");
    console.log("Mensaje productos:", mensajeProductosWhatsApp);
    
    let mensaje = `📄 *FACTURA*\n\n` +
                  `*N°:* ${numero}\n` +
                  `*Cliente:* ${cliente}\n` +
                  `*Fecha:* ${fecha}\n\n` +
                  `--------------------------\n` +
                  `${mensajeProductosWhatsApp}` +
                  `--------------------------\n` +
                  `*TOTAL: $${total}*\n\n` +
                  `¡Gracias por su compra!`;
    
    console.log("Mensaje completo:", mensaje);
    window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(mensaje)}`, '_blank');
}
</script>
    
</body>
</html>
