<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Factura - Montana</title>
    
    <!-- Librería para generar PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
            padding: 20px;
        }

        .factura {
            background: white;
            padding: 15px;
            border-radius: 10px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .logo {
            width: 100%;
            max-width: 280px;
            height: auto;
            margin: 0 auto 10px auto;
            display: block;
        }

        h2 {
            margin: 8px 0;
            color: #333;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 8px;
            font-size: 20px;
        }

        .dato {
            margin: 5px 0;
            font-size: 14px;
            text-align: left;
            padding-left: 15px;
        }

        table {
            width: 100%;
            margin: 12px 0;
            border-collapse: collapse;
            font-size: 14px;
        }

        table th, table td {
            border: 1px solid #ddd;
            padding: 6px;
            text-align: left;
        }

        table th {
            background-color: #4CAF50;
            color: white;
        }

        table tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .total-section {
            text-align: right;
            padding-right: 15px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            color: #333;
        }

        .botones {
            margin-top: 15px;
        }

        .boton {
            display: inline-block;
            margin: 8px 5px;
            padding: 10px 18px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            color: white;
            transition: all 0.3s;
        }

        .whatsapp {
            background: #25D366;
        }

        .whatsapp:hover {
            background: #20BA5A;
            transform: scale(1.05);
        }

        .pdf {
            background: #DC3545;
        }

        .pdf:hover {
            background: #C82333;
            transform: scale(1.05);
        }

        .footer {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 2px solid #4CAF50;
            font-size: 12px;
            color: #666;
        }

        .footer p {
            margin: 3px 0;
        }

        /* Ocultar botones al generar PDF */
        @media print {
            .botones {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="factura" id="factura">
    <!-- Logo de la empresa (más pequeño) -->
    <img src="https://customer-assets.emergentagent.com/job_factura-digital-pos/artifacts/oogrw38i_LogoFactura.png" 
         alt="Montana Logo" 
         class="logo">
    
    <h2>🧾 Factura de Venta</h2>

    <div class="dato" id="numero"></div>
    <div class="dato" id="cliente"></div>
    <div class="dato" id="fecha"></div>
    
    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th style="text-align: center; width: 80px;">Cant.</th>
                <th style="text-align: right; width: 100px;">Subtotal</th>
            </tr>
        </thead>
        <tbody id="lista">
        </tbody>
    </table>
    
    <div class="total-section" id="total"></div>

    <div class="footer">
        <p><b>¡Gracias por su compra! 🎉</b></p>
        <p>Variedades y Papelería Montana</p>
    </div>

    <!-- Botones (no aparecerán en el PDF) -->
    <div class="botones">
        <button class="boton whatsapp" onclick="enviarWhatsApp()">📲 WhatsApp</button>
        <button class="boton pdf" onclick="generarPDF()">📄 Descargar PDF</button>
    </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);

const numero = params.get("num") || "00000";
const cliente = params.get("cliente") || "Consumidor Final";
const fechaYHora = params.get("fecha") || "Sin fecha";
const total = params.get("total") || "0";
const productosRaw = params.get("productos") || "";

let tablaHtml = "";
let mensajeProductosWhatsApp = "";

if (productosRaw && productosRaw.length > 0) {
    const filas = productosRaw.split("|");
    
    filas.forEach((fila) => {
        const datos = fila.split(",");
        
        if (datos.length >= 3) {
            const producto = datos[0].trim();
            const cantidad = datos[1].trim();
            const subtotal = datos[2].trim();
            
            tablaHtml += `<tr>
                <td>${producto}</td>
                <td style="text-align: center;">${cantidad}</td>
                <td style="text-align: right;">$${subtotal}</td>
            </tr>`;
            
            mensajeProductosWhatsApp += `*Producto:* ${producto}\n*Cantidad:* ${cantidad}\n*Subtotal:* $${subtotal}\n\n`;
        }
    });
}

document.getElementById("numero").innerHTML = `<b>📋 Factura N°:</b> ${numero}`;
document.getElementById("cliente").innerHTML = `<b>👤 Cliente:</b> ${cliente}`;
document.getElementById("fecha").innerHTML = `<b>📅 Fecha y Hora:</b> ${fechaYHora}`;
document.getElementById("total").innerHTML = `TOTAL: $${total}`;
document.getElementById("lista").innerHTML = tablaHtml || "<tr><td colspan='3' style='text-align: center;'>No hay productos</td></tr>";

// Función para enviar por WhatsApp
function enviarWhatsApp() {
    const telefonoTienda = "3044258788";
    let mensaje = `🏪 *VARIEDADES Y PAPELERÍA MONTANA*\n` +
                  `📍 Calle Principal #123\n` +
                  `📞 Contacto: ${telefonoTienda}\n` +
                  `------------------------------------------\n` +
                  `📄 *FACTURA*\n\n` +
                  `*N°:* ${numero}\n` +
                  `*Cliente:* ${cliente}\n` +
                  `*Fecha y Hora:* ${fechaYHora}\n\n` +
                  `--------------------------\n` +
                  `${mensajeProductosWhatsApp}` +
                  `--------------------------\n` +
                  `*TOTAL: $${total}*\n\n` +
                  `¡Gracias por su compra! 🎉`
                  `_Vuelva pronto_`;

    window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(mensaje)}`, '_blank');
}

// Función para generar PDF (optimizada para 1 página)
function generarPDF() {
    const element = document.getElementById('factura');
    
    // Ocultar botones temporalmente
    const botones = document.querySelector('.botones');
    botones.style.display = 'none';
    
    const opt = {
        margin: [5, 10, 5, 10],  // Márgenes más pequeños: [top, left, bottom, right]
        filename: `Factura_Montana_${numero}.pdf`,
        image: { type: 'jpeg', quality: 0.95 },
        html2canvas: { 
            scale: 2,
            useCORS: true,
            logging: false
        },
        jsPDF: { 
            unit: 'mm', 
            format: 'a4', 
            orientation: 'portrait',
            compress: true
        },
        pagebreak: { mode: 'avoid-all' }  // Evitar saltos de página
    };

    // Generar PDF
    html2pdf().set(opt).from(element).save().then(() => {
        // Mostrar botones nuevamente
        botones.style.display = 'block';
    });
}
</script>
    
</body>
</html>
